<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Customer Support Portal{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f7fa; color: #1a1a2e; }

    .lab-banner {
      background: #b91c1c; color: #fff;
      padding: 10px 20px; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }

    nav {
      background: #1e3a5f; color: #fff;
      padding: 14px 32px; display: flex; align-items: center; gap: 24px;
    }
    nav .brand { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
    nav a { color: #93c5fd; text-decoration: none; font-size: 14px; }
    nav a:hover { color: #fff; }

    main { max-width: 860px; margin: 36px auto; padding: 0 20px; }

    .card {
      background: #fff; border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 28px 32px; margin-bottom: 24px;
    }
    .card h2 { font-size: 18px; margin-bottom: 16px; color: #1e3a5f; }

    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151; }
    input[type=text], input[type=file], textarea {
      width: 100%; padding: 9px 12px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 14px; font-family: inherit;
    }
    textarea { resize: vertical; font-family: monospace; font-size: 13px; }
    .form-group { margin-bottom: 16px; }

    button {
      background: #1e3a5f; color: #fff; border: none;
      padding: 10px 22px; border-radius: 6px; font-size: 14px;
      cursor: pointer; font-weight: 600;
    }
    button:hover { background: #2d5a8e; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .badge-high   { background: #fee2e2; color: #991b1b; }
    .badge-medium { background: #fef3c7; color: #92400e; }
    .badge-low    { background: #d1fae5; color: #065f46; }

    .alert { padding: 12px 16px; border-radius: 6px; font-size: 14px; margin-bottom: 16px; }
    .alert-success { background: #d1fae5; color: #065f46; }
    .alert-error   { background: #fee2e2; color: #991b1b; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 10px 14px; background: #f1f5f9; color: #374151; font-weight: 600; }
    td { padding: 10px 14px; border-bottom: 1px solid #e5e7eb; }

    .role-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .role-card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; }
    .role-card h3 { font-size: 14px; color: #1e3a5f; margin-bottom: 8px; }
    .role-card p  { font-size: 13px; color: #6b7280; line-height: 1.5; }

    #result { margin-top: 16px; }
  </style>
</head>
<body>
  <div class="lab-banner">
    ⚠ LAB DEMO — 此应用包含已知 CVE（受控靶场），仅用于安全演示，禁止部署至生产环境。
  </div>
  <nav>
    <span class="brand">Customer Support Portal</span>
    <a href="/">客户入口</a>
    <a href="/admin">App Owner</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
